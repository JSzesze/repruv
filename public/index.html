<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Turn a public webpage or X post into clean Markdown." />
    <title>Repruv</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/dotted-glow.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a href="/" aria-label="Repruv home">
        <span>REPRUV</span>
        <span class="brand-dot" aria-hidden="true"></span>
      </a>
    </header>

    <main>
      <section class="converter" aria-label="URL to Markdown">
        <div class="input-shell">
          <div class="dot-field" aria-hidden="true">
            <canvas id="dotted-glow-canvas"></canvas>
          </div>

          <form id="extract-form">
            <label class="sr-only" for="url">Public URL</label>
            <div class="input-row">
              <input
                id="url"
                name="url"
                type="url"
                inputmode="url"
                autocomplete="url"
                autocapitalize="none"
                spellcheck="false"
                placeholder="Paste a URL"
                required
                autofocus
              />
              <button type="submit" aria-label="Convert URL">
                <span class="button-label" aria-hidden="true">→</span>
              </button>
            </div>
          </form>

          <section id="error" class="error" hidden aria-live="assertive">
            <p id="error-message"></p>
          </section>
        </div>
      </section>

      <section id="result" class="result" hidden aria-live="polite" aria-busy="false">
        <header class="result-header">
          <div>
            <h1 id="title"></h1>
            <p id="meta"></p>
          </div>
          <div class="actions">
            <button id="copy" type="button">Copy</button>
            <button id="download" type="button">Download</button>
          </div>
        </header>
        <pre tabindex="0"><code id="output"></code></pre>
      </section>
    </main>
  </body>
</html>
