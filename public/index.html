<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080808" />
    <meta name="description" content="Turn a public webpage or X post into clean Markdown." />
    <meta property="og:title" content="Repruv — URL to Markdown" />
    <meta property="og:description" content="Paste a public URL. Get clean Markdown." />
    <title>Repruv — URL to Markdown</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/dotted-glow.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#url">Skip to URL input</a>
    <div class="noise-overlay" aria-hidden="true"></div>

    <aside class="side-rail" aria-label="Repruv">
      <a class="rail-mark" href="/" aria-label="Repruv home">R</a>
      <span class="rail-signal" aria-hidden="true"></span>
      <span class="rail-index">01</span>
    </aside>

    <header class="mobile-bar">
      <a href="/" aria-label="Repruv home">REPRUV</a>
      <span>URL / MD</span>
    </header>

    <main class="grid-bg">
      <section id="convert" class="input-stage" aria-labelledby="input-title">
        <div class="dotted-glow" aria-hidden="true">
          <canvas id="dotted-glow-canvas"></canvas>
        </div>

        <div class="input-module">
          <div class="module-heading">
            <span>01 / CONVERT</span>
            <span>PUBLIC UTILITY</span>
          </div>
          <h1 id="input-title">URL TO MARKDOWN</h1>

          <form id="extract-form">
            <div class="input-group">
              <input
                id="url"
                name="url"
                type="url"
                inputmode="url"
                autocomplete="url"
                autocapitalize="none"
                spellcheck="false"
                placeholder="https://example.com/article"
                aria-label="Public URL"
                aria-describedby="privacy"
                required
              />
              <button class="convert-button" type="submit">
                <span class="button-label">Convert</span>
                <svg aria-hidden="true" viewBox="0 0 27 27">
                  <path d="M3.857 3.857h15.429l3.769 3.784-5.539 5.519 5.33 4.346v5.637h-5.34v-9.973l-9.849 9.813-3.77-3.783L13.926 9.197H3.857V3.857Z" />
                </svg>
              </button>
            </div>
            <div class="form-foot">
              <p id="privacy">PUBLIC URLS ONLY / CACHED</p>
              <p class="form-state"><span aria-hidden="true"></span><span id="form-state">READY</span></p>
            </div>
            <div class="progress" aria-hidden="true"><span></span></div>
          </form>
        </div>

        <span class="build-tag">V.01 / CLOUDFLARE EDGE</span>
      </section>

      <section id="result" class="result" hidden aria-live="polite" aria-busy="false">
        <div class="result-heading">
          <div>
            <p id="meta" class="meta"></p>
            <h2 id="title"></h2>
          </div>
          <div class="actions">
            <button id="copy" type="button">Copy</button>
            <button id="download" type="button">Download</button>
          </div>
        </div>
        <div id="output-panel" class="output-panel" tabindex="0">
          <pre><code id="output"></code></pre>
        </div>
      </section>

      <section id="error" class="error" hidden aria-live="assertive">
        <p id="error-message"></p>
      </section>
    </main>
  </body>
</html>
