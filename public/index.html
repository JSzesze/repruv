<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Convert public webpages and X posts into clean Markdown. Free, fast, and cached at the edge."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Repruv" />
    <meta property="og:title" content="Repruv — URL to Markdown Converter" />
    <meta
      property="og:description"
      content="Convert public webpages and X posts into clean Markdown. Free, fast, and cached at the edge."
    />
    <meta property="og:url" content="https://repruv.com/" />
    <meta property="og:image" content="https://repruv.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Repruv URL to Markdown converter" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Repruv — URL to Markdown Converter" />
    <meta
      name="twitter:description"
      content="Convert public webpages and X posts into clean Markdown. Free, fast, and cached at the edge."
    />
    <meta name="twitter:image" content="https://repruv.com/og.png" />
    <title>Repruv — URL to Markdown Converter</title>
    <link rel="canonical" href="https://repruv.com/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://repruv.com/#website",
            "url": "https://repruv.com/",
            "name": "Repruv",
            "description": "Convert public webpages and X posts into clean Markdown."
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://repruv.com/#application",
            "name": "Repruv",
            "url": "https://repruv.com/",
            "description": "A free URL to Markdown converter for public webpages and X posts.",
            "applicationCategory": "UtilitiesApplication",
            "operatingSystem": "Any",
            "isAccessibleForFree": true,
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            },
            "featureList": [
              "Convert public webpages to Markdown",
              "Convert public X posts to Markdown",
              "Edge-cached results"
            ]
          }
        ]
      }
    </script>
    <script src="/dotted-glow.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a href="/" aria-label="Repruv home">
        <span>REPRUV</span>
        <span class="brand-dot" aria-hidden="true"></span>
      </a>
    </header>

    <main>
      <h1 class="sr-only">Repruv URL to Markdown converter</h1>
      <p class="sr-only">Convert public webpages and X posts into clean Markdown for free.</p>
      <section class="converter" aria-label="URL to Markdown">
        <div class="input-shell">
          <div class="dot-field" aria-hidden="true">
            <canvas id="dotted-glow-canvas"></canvas>
          </div>

          <form id="extract-form">
            <label class="sr-only" for="url">Public URL</label>
            <div class="input-row">
              <input
                id="url"
                name="url"
                type="url"
                inputmode="url"
                autocomplete="url"
                autocapitalize="none"
                spellcheck="false"
                placeholder="Paste a URL"
                required
                autofocus
              />
              <button type="submit" aria-label="Convert URL">
                <svg class="button-icon" aria-hidden="true" viewBox="0 0 16 16">
                  <path d="M2.5 8h10M8.5 4l4 4-4 4" />
                </svg>
              </button>
            </div>
          </form>

          <section id="error" class="error" hidden aria-live="assertive">
            <p id="error-message"></p>
          </section>
        </div>
      </section>

      <section id="result" class="result" hidden aria-live="polite" aria-busy="false">
        <header class="result-header">
          <div>
            <h2 id="title"></h2>
            <p id="meta"></p>
          </div>
          <div class="actions">
            <button id="copy" type="button">Copy</button>
            <button id="download" type="button">Download</button>
          </div>
        </header>
        <pre tabindex="0"><code id="output"></code></pre>
      </section>
    </main>
  </body>
</html>
