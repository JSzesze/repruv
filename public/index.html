<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171614" />
    <meta name="description" content="Turn a public webpage or X post into clean Markdown." />
    <meta property="og:title" content="Repruv — URL to Markdown" />
    <meta property="og:description" content="Paste a public URL. Get clean Markdown." />
    <title>Repruv — URL to Markdown</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600&family=Atkinson+Hyperlegible+Next:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/dotted-glow.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#url">Skip to URL input</a>

    <div class="dotted-glow" aria-hidden="true">
      <canvas id="dotted-glow-canvas"></canvas>
    </div>

    <div class="page">
      <header>
        <a class="wordmark" href="/" aria-label="Repruv home">repruv<span aria-hidden="true">/</span></a>
      </header>

      <main>
        <section class="intro" aria-labelledby="page-title">
          <p class="eyebrow">URL to Markdown</p>
          <h1 id="page-title">Paste a link.</h1>
          <p class="lede">Get clean Markdown from a public webpage or X post.</p>

          <form id="extract-form">
            <div class="input-group">
              <input
                id="url"
                name="url"
                type="url"
                inputmode="url"
                autocomplete="url"
                autocapitalize="none"
                spellcheck="false"
                placeholder="https://example.com/article"
                aria-label="Public URL"
                aria-describedby="privacy"
                required
              />
              <button class="convert-button" type="submit">
                <span class="button-label">Convert</span>
                <span class="button-arrow" aria-hidden="true">→</span>
              </button>
            </div>
            <div class="form-foot">
              <p id="privacy">Public URLs only. Results are cached.</p>
              <button id="example" class="example-button" type="button">Try example</button>
            </div>
            <div class="progress" aria-hidden="true"><span></span></div>
          </form>
        </section>

        <section id="result" class="result" hidden aria-live="polite" aria-busy="false">
          <div class="result-heading">
            <div>
              <p id="meta" class="meta"></p>
              <h2 id="title"></h2>
            </div>
            <div class="actions">
              <button id="copy" type="button">Copy</button>
              <button id="download" type="button">Download</button>
            </div>
          </div>
          <div id="output-panel" class="output-panel" tabindex="0">
            <pre><code id="output"></code></pre>
          </div>
        </section>

        <section id="error" class="error" hidden aria-live="assertive">
          <p id="error-message"></p>
        </section>
      </main>
    </div>
  </body>
</html>
